set-option -g default-shell /usr/bin/zsh
set-option -g default-terminal "screen-256color"

# Allow mouse scroll wheel
set -g mouse on

# Setting scrollback history to some huge number bc you know you want it
set -g history-limit 1000000

# -----------------------------------------------------------------------------
# Solarized theme
# -----------------------------------------------------------------------------
set -g status-right '#H'
set-option -g status-position top

# default statusbar colors
set-option -g status-style bg=colour235,fg="${PROFILE_COLOR}",default # fg/bg=base02

set-window-option -g status-left " #S "
set-window-option -g status-left-length 20
set-window-option -g status-left-style fg=black,bg=white

set-window-option -g status-right " %H:%M %d-%b-%y "
set-window-option -g status-right-style fg=black,bg=white

# Refresh status bar every second for claude notification dot
set -g status-interval 1

# default window title colors
set-window-option -g window-status-style fg="${PROFILE_COLOR}",bg=black,dim
set-window-option -g window-status-format " #I:#W#([ -f /tmp/claude-blocked-#{window_id} ] && printf ' #[fg=white]●#[default]' || { [ -f /tmp/claude-thinking-#{window_id} ] && [ $(( $(date +%%S) % 2 )) -eq 0 ] && printf ' #[fg=white]⟳#[default]'; } || { [ -f /tmp/claude-thinking-#{window_id} ] && printf ' #[fg=white]↻#[default]'; }) "

# active window title colors
set-window-option -g window-status-current-format " #I:#W#([ -f /tmp/claude-blocked-#{window_id} ] && printf ' #[fg=white]●#[default]' || { [ -f /tmp/claude-thinking-#{window_id} ] && [ $(( $(date +%%S) % 2 )) -eq 0 ] && printf ' #[fg=white]⟳#[default]'; } || { [ -f /tmp/claude-thinking-#{window_id} ] && printf ' #[fg=white]↻#[default]'; }) "
set-window-option -g window-status-current-style fg=black,bg="${PROFILE_COLOR}"

# pane border
set-option -g pane-border-style fg=white
set-option -g pane-active-border-style fg="${PROFILE_COLOR}"

# message text
set-option -g message-style bg=colour235,fg=colour166 #bg=base02, fg=orange

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# window management
set-option -g renumber-windows on
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

bind-key -n C-Left previous-window
bind-key -n C-Right next-window

# pane management
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -D
# keep current dir on split
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

